<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Support CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-indigo-700 text-white px-6 py-4 flex items-center justify-between shadow">
    <span class="text-xl font-bold tracking-wide">🎫 Support CRM</span>
    <a href="/create" class="bg-white text-indigo-700 font-semibold px-4 py-2 rounded-lg hover:bg-indigo-50 transition">+ New Ticket</a>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-8">

    <!-- Search & Filter -->
    <div class="flex flex-col sm:flex-row gap-3 mb-6">
      <input id="search" type="text" placeholder="Search by name, email, ID, description…"
        class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"
        oninput="loadTickets()" />
      <select id="statusFilter" onchange="loadTickets()"
        class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white">
        <option value="">All Statuses</option>
        <option value="Open">Open</option>
        <option value="In Progress">In Progress</option>
        <option value="Closed">Closed</option>
      </select>
    </div>

    <!-- Stats -->
    <div id="stats" class="grid grid-cols-3 gap-4 mb-6"></div>

    <!-- Table -->
    <div class="bg-white rounded-xl shadow overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-indigo-50 text-indigo-700 uppercase text-xs">
          <tr>
            <th class="px-4 py-3 text-left">ID</th>
            <th class="px-4 py-3 text-left">Customer</th>
            <th class="px-4 py-3 text-left">Subject</th>
            <th class="px-4 py-3 text-left">Status</th>
            <th class="px-4 py-3 text-left">Created</th>
            <th class="px-4 py-3 text-left">Action</th>
          </tr>
        </thead>
        <tbody id="ticketBody" class="divide-y divide-gray-100"></tbody>
      </table>
      <div id="empty" class="hidden text-center text-gray-400 py-16 text-lg">No tickets found.</div>
    </div>
  </main>

  <script>
    const statusColor = {
      "Open": "bg-blue-100 text-blue-700",
      "In Progress": "bg-yellow-100 text-yellow-700",
      "Closed": "bg-green-100 text-green-700"
    };

    async function loadTickets() {
      const search = document.getElementById("search").value.trim();
      const status = document.getElementById("statusFilter").value;
      let url = "/api/tickets?";
      if (search) url += `search=${encodeURIComponent(search)}&`;
      if (status) url += `status=${encodeURIComponent(status)}`;

      const res = await fetch(url);
      const tickets = await res.json();

      const body = document.getElementById("ticketBody");
      const empty = document.getElementById("empty");
      body.innerHTML = "";

      if (tickets.length === 0) {
        empty.classList.remove("hidden");
      } else {
        empty.classList.add("hidden");
        tickets.forEach(t => {
          const date = new Date(t.created_at).toLocaleDateString("en-IN", {day:"2-digit",month:"short",year:"numeric"});
          const badge = statusColor[t.status] || "bg-gray-100 text-gray-600";
          body.innerHTML += `
            <tr class="hover:bg-gray-50 transition">
              <td class="px-4 py-3 font-mono font-semibold text-indigo-600">${t.ticket_id}</td>
              <td class="px-4 py-3">
                <div class="font-medium text-gray-800">${t.customer_name}</div>
                <div class="text-xs text-gray-400">${t.customer_email}</div>
              </td>
              <td class="px-4 py-3 text-gray-700 max-w-xs truncate">${t.subject}</td>
              <td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs font-semibold ${badge}">${t.status}</span></td>
              <td class="px-4 py-3 text-gray-500 text-xs">${date}</td>
              <td class="px-4 py-3">
                <a href="/ticket/${t.ticket_id}" class="text-indigo-600 hover:underline font-medium">View →</a>
              </td>
            </tr>`;
        });
      }

      // Stats
      const all = await (await fetch("/api/tickets")).json();
      const open = all.filter(t => t.status === "Open").length;
      const inprog = all.filter(t => t.status === "In Progress").length;
      const closed = all.filter(t => t.status === "Closed").length;
      document.getElementById("stats").innerHTML = `
        <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 text-center">
          <div class="text-2xl font-bold text-blue-600">${open}</div>
          <div class="text-sm text-blue-500 mt-1">Open</div>
        </div>
        <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 text-center">
          <div class="text-2xl font-bold text-yellow-600">${inprog}</div>
          <div class="text-sm text-yellow-500 mt-1">In Progress</div>
        </div>
        <div class="bg-green-50 border border-green-200 rounded-xl p-4 text-center">
          <div class="text-2xl font-bold text-green-600">${closed}</div>
          <div class="text-sm text-green-500 mt-1">Closed</div>
        </div>`;
    }

    loadTickets();
  </script>
</body>
</html>
