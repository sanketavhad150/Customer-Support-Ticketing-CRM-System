<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ticket Detail – Support CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-indigo-700 text-white px-6 py-4 flex items-center justify-between shadow">
    <a href="/" class="text-xl font-bold tracking-wide">🎫 Support CRM</a>
    <a href="/" class="text-sm text-indigo-200 hover:text-white">← Back to Tickets</a>
  </nav>

  <main class="max-w-3xl mx-auto px-4 py-10 space-y-6">

    <!-- Ticket Info Card -->
    <div class="bg-white rounded-xl shadow p-6" id="ticketCard">
      <div class="animate-pulse space-y-3">
        <div class="h-5 bg-gray-200 rounded w-1/3"></div>
        <div class="h-4 bg-gray-200 rounded w-2/3"></div>
        <div class="h-4 bg-gray-200 rounded w-1/2"></div>
      </div>
    </div>

    <!-- Update Status -->
    <div class="bg-white rounded-xl shadow p-6">
      <h2 class="text-lg font-semibold text-gray-700 mb-4">Update Status</h2>
      <div class="flex gap-3 flex-wrap">
        <button onclick="updateStatus('Open')"
          class="px-4 py-2 rounded-lg border-2 border-blue-400 text-blue-600 font-semibold hover:bg-blue-50 transition">Open</button>
        <button onclick="updateStatus('In Progress')"
          class="px-4 py-2 rounded-lg border-2 border-yellow-400 text-yellow-600 font-semibold hover:bg-yellow-50 transition">In Progress</button>
        <button onclick="updateStatus('Closed')"
          class="px-4 py-2 rounded-lg border-2 border-green-400 text-green-600 font-semibold hover:bg-green-50 transition">Closed</button>
      </div>
      <div id="statusMsg" class="hidden mt-3 text-sm font-medium text-green-600"></div>
    </div>

    <!-- Add Note -->
    <div class="bg-white rounded-xl shadow p-6">
      <h2 class="text-lg font-semibold text-gray-700 mb-4">Add Note / Comment</h2>
      <textarea id="noteInput" rows="3" placeholder="Write a note or internal comment…"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none mb-3"></textarea>
      <button onclick="addNote()"
        class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-5 py-2 rounded-lg transition">Add Note</button>
      <div id="noteMsg" class="hidden mt-2 text-sm font-medium text-green-600"></div>
    </div>

    <!-- Notes List -->
    <div class="bg-white rounded-xl shadow p-6">
      <h2 class="text-lg font-semibold text-gray-700 mb-4">Notes & Comments</h2>
      <div id="notesList" class="space-y-3 text-sm text-gray-600">
        <p class="text-gray-400">No notes yet.</p>
      </div>
    </div>

  </main>

  <script>
    const ticketId = "{{ ticket_id }}";
    const statusColor = {
      "Open": "bg-blue-100 text-blue-700",
      "In Progress": "bg-yellow-100 text-yellow-700",
      "Closed": "bg-green-100 text-green-700"
    };

    async function loadTicket() {
      const res = await fetch(`/api/tickets/${ticketId}`);
      if (!res.ok) {
        document.getElementById("ticketCard").innerHTML = `<p class="text-red-500">Ticket not found.</p>`;
        return;
      }
      const t = await res.json();
      const badge = statusColor[t.status] || "bg-gray-100 text-gray-600";
      const created = new Date(t.created_at).toLocaleString("en-IN");
      const updated = new Date(t.updated_at).toLocaleString("en-IN");

      document.getElementById("ticketCard").innerHTML = `
        <div class="flex items-start justify-between flex-wrap gap-3">
          <div>
            <span class="font-mono text-indigo-600 font-bold text-lg">${t.ticket_id}</span>
            <span class="ml-3 px-2 py-1 rounded-full text-xs font-semibold ${badge}">${t.status}</span>
          </div>
          <div class="text-xs text-gray-400">Created: ${created}</div>
        </div>
        <h1 class="text-xl font-bold text-gray-800 mt-3">${t.subject}</h1>
        <p class="text-gray-600 mt-2 leading-relaxed">${t.description}</p>
        <div class="mt-4 pt-4 border-t border-gray-100 flex flex-wrap gap-6 text-sm text-gray-500">
          <div><span class="font-medium text-gray-700">Customer:</span> ${t.customer_name}</div>
          <div><span class="font-medium text-gray-700">Email:</span> ${t.customer_email}</div>
          <div><span class="font-medium text-gray-700">Last Updated:</span> ${updated}</div>
        </div>`;

      renderNotes(t.notes);
    }

    function renderNotes(notes) {
      const el = document.getElementById("notesList");
      if (!notes || notes.length === 0) {
        el.innerHTML = `<p class="text-gray-400">No notes yet.</p>`;
        return;
      }
      el.innerHTML = notes.map(n => `
        <div class="bg-gray-50 border border-gray-200 rounded-lg px-4 py-3">
          <p class="text-gray-700">${n.note_text}</p>
          <p class="text-xs text-gray-400 mt-1">${new Date(n.created_at).toLocaleString("en-IN")}</p>
        </div>`).join("");
    }

    async function updateStatus(status) {
      const res = await fetch(`/api/tickets/${ticketId}`, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({status})
      });
      const msg = document.getElementById("statusMsg");
      if (res.ok) {
        msg.textContent = `✅ Status updated to "${status}"`;
        msg.classList.remove("hidden");
        setTimeout(() => msg.classList.add("hidden"), 2000);
        loadTicket();
      }
    }

    async function addNote() {
      const note = document.getElementById("noteInput").value.trim();
      if (!note) return;
      const res = await fetch(`/api/tickets/${ticketId}`, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({note})
      });
      const msg = document.getElementById("noteMsg");
      if (res.ok) {
        document.getElementById("noteInput").value = "";
        msg.textContent = "✅ Note added!";
        msg.classList.remove("hidden");
        setTimeout(() => msg.classList.add("hidden"), 2000);
        loadTicket();
      }
    }

    loadTicket();
  </script>
</body>
</html>
